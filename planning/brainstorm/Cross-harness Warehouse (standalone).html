  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  { date:'2026-07-09 01:05', h:'cursor', project:'lite-rpg',  msgs:66, model:'gpt-5',          prompt:'refactor the inventory system so stacks merge on pickup and…' },\n      { date:'2026-07-08 21:58', h:'claude', project:'stockroom', msgs:8,  model:'N/A',            prompt:'<manually_attached_skills> The user has manually attached the following skil…' },\n      { date:'2026-07-08 20:16', h:'codex',  project:'a16n',      msgs:74, model:'gpt-5',          prompt:'add cursor-based pagination to the results endpoint and…' },\n      { date:'2026-07-08 19:28', h:'claude', project:'stockroom', msgs:60, model:'claude-sonnet-5',prompt:'write tests for the ingest layer covering the message-identity…' },\n      { date:'2026-07-08 18:45', h:'cursor', project:'devblog',   msgs:76, model:'claude-sonnet-5',prompt:'fix the RSS feed generation — dates are off by one in…' },\n      { date:'2026-07-08 17:06', h:'claude', project:'stockroom', msgs:57, model:'claude-fable-5', prompt:'<uploaded_documents> The following documents have been saved to your f…' },\n      { date:'2026-07-08 16:19', h:'codex',  project:'a16n',      msgs:67, model:'o3',             prompt:'optimize the query planner so the model×harness rollup runs in…' },\n    ],\n  };\n\n  fmt(n){ if(n==null) return '0'; if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1).replace(/\\.0$/,'')+'K'; return String(Math.round(n)); }\n  sel(){ return this.H.filter(h => this.state.selected.includes(h.key)); }\n\n  // ---- lifecycle ----\n  componentDidMount(){\n    this.charts = [];\n    this.mq = window.matchMedia('(prefers-color-scheme: dark)');\n    this.state.dark = this.mq.matches;\n    this._onScheme = () => { this.setState({ dark: this.mq.matches }); };\n    this.mq.addEventListener('change', this._onScheme);\n    this._onDoc = (e) => { if(this.state.menuOpen){ this.setState({ menuOpen:false }); } };\n    setTimeout(()=>document.addEventListener('click', this._onDoc), 0);\n    this.waitChart(0);\n  }\n  componentWillUnmount(){\n    if(this.mq) this.mq.removeEventListener('change', this._onScheme);\n    document.removeEventListener('click', this._onDoc);\n    this.destroyCharts();\n  }\n  componentDidUpdate(){\n    const sig = this.state.mode + '|' + [...this.state.selected].sort().join(',') + '|' + this.state.dark;\n    if(sig !== this._sig && window.Chart){ this._sig = sig; this.buildCharts(); }\n  }\n  waitChart(n){ if(window.Chart){ this.buildCharts(); return; } if(n>60) return; setTimeout(()=>this.waitChart(n+1), 100); }\n\n  destroyCharts(){ (this.charts||[]).forEach(c=>{ try{c.destroy();}catch(e){} }); this.charts=[]; }\n\n  theme(){\n    const d = this.state.dark;\n    return {\n      grid: d ? '#232b3a' : '#eef0f2',\n      tick: d ? '#8b93a7' : '#9ca3af',\n      ink:  d ? '#c9cfdd' : '#374151',\n      legend: d ? '#98a2b8' : '#6b7280',\n    };\n  }\n\n  buildCharts(){\n    if(!window.Chart) return;\n    const C = window.Chart, T = this.theme(), root = this.el || document;\n    C.defaults.font.family = \"system-ui,-apple-system,'Segoe UI',sans-serif\";\n    C.defaults.font.size = 12;\n    C.defaults.plugins.legend.display = false;\n    C.defaults.maintainAspectRatio = false;\n    this.destroyCharts();\n    const $ = id => root.querySelector('#'+id);\n    const chosen = this.sel();\n    const agg = this.state.mode === 'aggregate';\n    const push = c => this.charts.push(c);\n\n    const legendOpts = (show) => ({ display: show, position:'top', align:'end',\n      labels:{ boxWidth:9, boxHeight:9, usePointStyle:true, pointStyle:'circle', color:T.legend, font:{size:11} } });\n\n    // generic bar (vertical or horizontal); aggregate=1 series, compare=N series\n    const bar = (id, labels, map, {indexAxis='x', stacked=true, avg=false, monoTicks=false}={}) => {\n      const el = $(id); if(!el) return;\n      let datasets;\n      if(agg){\n        const d = labels.map((_,i)=>{ const v = chosen.map(h=>map[h.key][i]); return avg ? Math.round(v.reduce((a,b)=>a+b,0)/Math.max(v.length,1)) : v.reduce((a,b)=>a+b,0); });\n        datasets = [{ label:'All selected', data:d, backgroundColor:this.ACCENT, borderRadius:3, barPercentage:indexAxis==='y'?0.72:0.62 }];\n      } else {\n        datasets = chosen.map(h=>({ label:h.name, data:map[h.key], backgroundColor:h.color, borderRadius:3, barPercentage:0.72, stack: stacked?'s':undefined }));\n      }\n      const st = !agg && stacked;\n      push(new C(el, { type:'bar', data:{ labels, datasets },\n        options:{ indexAxis, plugins:{ legend: legendOpts(!agg && chosen.length>1) },\n          scales:{\n            x:{ stacked:st, grid:{ display:indexAxis==='y', color:T.grid }, ticks:{ color:T.tick, font: monoTicks&&indexAxis==='x'?{family:'ui-monospace,monospace',size:11}:{} }, beginAtZero:true },\n            y:{ stacked:st, grid:{ display:indexAxis==='x', color:T.grid }, ticks:{ color: indexAxis==='y'?T.ink:T.tick, font: monoTicks&&indexAxis==='y'?{family:'ui-monospace,monospace',size:11}:{} }, beginAtZero:true }\n          } } }));\n    };\n\n    bar('c-daily', this.data.days, this.data.daily, { stacked:true });\n    bar('c-projects', this.data.projects, this.data.proj, { indexAxis:'y', stacked:true, monoTicks:true });\n    bar('c-eff', this.data.buckets, this.data.eff, { stacked:true });\n    bar('c-models', this.data.models, this.data.model, { indexAxis:'y', stacked:true, monoTicks:true });\n    bar('c-fp', this.data.fpLabels, this.data.fp, { stacked:false, avg:true });\n\n    // TOOLS: aggregate -> donut; compare -> stacked horizontal bar\n    const tEl = $('c-tools');\n    if(tEl){\n      if(agg){\n        const totals = this.data.tools.map((_,i)=> chosen.reduce((s,h)=>s+this.data.tool[h.key][i],0));\n        const pal = ['#6366f1','#3b82f6','#0ea5e9','#06b6d4','#14b8a6','#22c55e','#84cc16','#eab308','#f97316','#94a3b8'];\n        push(new C(tEl, { type:'doughnut', data:{ labels:this.data.tools, datasets:[{ data:totals, backgroundColor:pal, borderWidth:0 }] },\n          options:{ cutout:'58%', plugins:{ legend:{ display:true, position:'right', labels:{ boxWidth:9, boxHeight:9, usePointStyle:true, pointStyle:'circle', color:T.legend, font:{size:11} } } } } }));\n      } else {\n        const datasets = chosen.map(h=>({ label:h.name, data:this.data.tool[h.key], backgroundColor:h.color, borderRadius:3, stack:'s' }));\n        push(new C(tEl, { type:'bar', data:{ labels:this.data.tools, datasets },\n          options:{ indexAxis:'y', plugins:{ legend: legendOpts(chosen.length>1) },\n            scales:{ x:{ stacked:true, beginAtZero:true, grid:{color:T.grid}, ticks:{color:T.tick} },\n                     y:{ stacked:true, grid:{display:false}, ticks:{ color:T.ink, font:{family:'ui-monospace,monospace',size:11} } } } } }));\n      }\n    }\n\n    // WRITE/READ: writes vs reads, blended across selected (both modes)\n    const wEl = $('c-wr');\n    if(wEl){\n      const sumW = this.data.weeks.map((_,i)=> chosen.reduce((s,h)=>s+this.data.writes[h.key][i],0));\n      const sumR = this.data.weeks.map((_,i)=> chosen.reduce((s,h)=>s+this.data.reads[h.key][i],0));\n      push(new C(wEl, { type:'line', data:{ labels:this.data.weeks, datasets:[\n          { label:'Reads', data:sumR, borderColor:'#3b82f6', backgroundColor:'transparent', tension:.35, pointRadius:0, pointHoverRadius:4, borderWidth:2.4 },\n          { label:'Writes', data:sumW, borderColor:this.ACCENT, backgroundColor:this.state.dark?'rgba(129,140,248,.14)':'rgba(99,102,241,.12)', fill:true, tension:.35, pointRadius:0, pointHoverRadius:4, borderWidth:2.4 },\n        ] },\n        options:{ plugins:{ legend: legendOpts(true) },\n          scales:{ x:{ grid:{display:false}, ticks:{color:T.tick} }, y:{ beginAtZero:true, grid:{color:T.grid}, ticks:{color:T.tick} } } } }));\n    }\n  }\n\n  // ---- view model ----\n  toggleHarness(key){\n    let s = this.state.selected.slice();\n    if(s.includes(key)){ if(s.length>1) s = s.filter(k=>k!==key); }\n    else s.push(key);\n    this.setState({ selected: s });\n  }\n\n  renderVals(){\n    const sel = this.state.selected, chosen = this.sel(), agg = this.state.mode==='aggregate';\n    const allSel = sel.length === this.H.length;\n\n    const selectedLabel = allSel ? 'All harnesses' : chosen.map(h=>h.name).join(', ');\n    const selectedDots = chosen.map(h=>({ color:h.color }));\n\n    const harnesses = this.H.map(h=>{\n      const on = sel.includes(h.key);\n      return { name:h.name, color:h.color, sessions:this.data.kpi[h.key].sessions,\n        check: on?'✓':'', box: on?h.color:'transparent', rowBg: on?'var(--hover)':'transparent',\n        onClick: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.toggleHarness(h.key); } };\n    });\n\n    // KPIs\n    const sum = (f)=> chosen.reduce((s,h)=>s+f(this.data.kpi[h.key]),0);\n    const curS=sum(k=>k.sessions), prevS=sum(k=>k.pS);\n    const curM=sum(k=>k.messages), prevM=sum(k=>k.pM);\n    const curP=sum(k=>k.projects), prevP=sum(k=>k.pP);\n    const avg = curS? Math.round(curM/curS) : 0;\n    const pct=(c,p)=>{ if(!p) return ''; const v=Math.round((c-p)/p*100); return (v>=0?'+':'')+v+'% vs prev 30d'; };\n    const upColor = 'var(--accent)';\n    const parts=(f)=>{ const tot=sum(f)||1; return chosen.filter(h=>f(this.data.kpi[h.key])>0).map(h=>({ width:(f(this.data.kpi[h.key])/tot*100).toFixed(1)+'%', color:h.color })); };\n    const kpis = [\n      { label:'Sessions', value:this.fmt(curS), delta:pct(curS,prevS), deltaColor:upColor, parts:parts(k=>k.sessions) },\n      { label:'Messages', value:this.fmt(curM), delta:pct(curM,prevM), deltaColor:upColor, parts:parts(k=>k.messages) },\n      { label:'Projects', value:String(curP), delta:pct(curP,prevP), deltaColor:upColor, parts:parts(k=>k.projects) },\n      { label:'Avg Msgs / Session', value:String(avg), delta:'', deltaColor:'var(--faint)', parts:parts(k=>k.messages) },\n    ];\n\n    // rows filtered by selection\n    const cmap = {}; this.H.forEach(h=>cmap[h.key]={color:h.color,name:h.name});\n    const rows = this.data.rows.filter(r=>sel.includes(r.h)).map(r=>({ date:r.date, color:cmap[r.h].color, harnessName:cmap[r.h].name, project:r.project, msgs:r.msgs, model:r.model, prompt:r.prompt }));\n\n    const btnBase='padding:6px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;border:none;font-family:inherit;';\n    const on='background:var(--pill-active);box-shadow:0 1px 2px rgba(0,0,0,.12);font-weight:600;color:var(--ink);';\n    const off='background:transparent;font-weight:500;color:var(--muted);';\n\n    return {\n      selectedLabel, selectedDots, selectedCount:sel.length,\n      menuOpen: this.state.menuOpen,\n      onToggleMenu: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.setState({ menuOpen: !this.state.menuOpen }); },\n      onSelectAll: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.setState({ selected: allSel ? [this.H[0].key] : this.H.map(h=>h.key) }); },\n      allCheck: allSel?'✓':'', allBox: allSel?'var(--accent)':'transparent',\n      harnesses,\n      onAgg: ()=>this.setState({ mode:'aggregate' }),\n      onCmp: ()=>this.setState({ mode:'compare' }),\n      aggStyle: btnBase + (agg?on:off),\n      cmpStyle: btnBase + (agg?off:on),\n      modeCaption: agg ? ('Blended across '+chosen.length+(chosen.length>1?' harnesses':' harness')) : 'Split by harness',\n      kpis, rows,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
