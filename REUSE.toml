version = 1
SPDX-PackageName = "stockroom"
SPDX-PackageSupplier = "Texarkanine <texarkanine@protonmail.com>"

# Layered licensing — order matters (last matching override wins):
#   1. base: everything is AGPL-3.0-or-later (worst-case-AGPL is intentional)
#   2. prompt-shaped skill payload (SKILL.md + references/**) is carved out to PPL-S
#   3. the exact vendored Chart.js artifact retains its upstream MIT identity
#   4. vendored dev tooling under .cursor/** has no license assertion

# 1. Default: all code, docs, and memory-bank content under AGPL.
[[annotations]]
path = ["**/*"]
SPDX-FileCopyrightText = "Texarkanine"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# 2. Prompt-shaped AgentSkills payload only — not the whole skills/** tree.
#    Software under skills/** inherits base AGPL; no claw-back re-assert needed.
[[annotations]]
path = [
    "skills/**/SKILL.md",
    "skills/**/references/**",
]
precedence = "override"
SPDX-FileCopyrightText = "Texarkanine"
SPDX-License-Identifier = "LicenseRef-PPL-S"

# 3. Exact upstream Chart.js / markdown-it runtime artifacts, vendored verbatim.
[[annotations]]
path = [
    "skills/sr-search/src/stockroom/dashboard/static/chart-4.5.1.umd.min.js",
]
precedence = "override"
SPDX-FileCopyrightText = "2014-2025 Chart.js Contributors"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = [
    "skills/sr-search/src/stockroom/dashboard/static/markdown-it-14.1.0.min.js",
]
precedence = "override"
SPDX-FileCopyrightText = "2014 Vitaly Puzrin, Alex Kocharin"
SPDX-License-Identifier = "MIT"

# 4. Vendored agent dev tooling (rules, skills, commands installed into this
#    repo) carries unknown/mixed upstream licensing. No claims are made.
[[annotations]]
path = [".cursor/**"]
precedence = "override"
SPDX-FileCopyrightText = "NOASSERTION"
SPDX-License-Identifier = "LicenseRef-NOASSERTION"
